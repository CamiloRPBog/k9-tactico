<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="K9 Tactico"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>K9 Tactico</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: rgba(255,255,255,0.08);
  --accent: #c8f135;
  --accent-dim: rgba(200,241,53,0.12);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --red: #ff4444;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
body { padding-bottom: 80px; }

/* HEADER */
.app-header { position: sticky; top: 0; z-index: 100; background: var(--bg); border-bottom: 1px solid var(--border); padding: 14px 20px 12px; display: flex; justify-content: space-between; align-items: center; }
.app-logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); }
.sync-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* PROGRESS HERO */
.hero { padding: 20px 20px 0; }
.hero-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
.hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; line-height: 1; letter-spacing: 1px; }
.hero-title span { color: var(--accent); }
.hero-pct { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--accent); line-height: 1; }
.progress-track { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.hero-meta { display: flex; gap: 20px; margin-top: 14px; }
.meta-item { display: flex; flex-direction: column; }
.meta-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.meta-value { font-size: 18px; font-weight: 500; color: var(--text); margin-top: 2px; }
.meta-value.accent { color: var(--accent); }

/* WEEK TABS */
.week-tabs { display: flex; gap: 8px; padding: 20px 20px 0; }
.wtab { flex: 1; padding: 10px 6px; text-align: center; font-size: 13px; font-weight: 500; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); cursor: pointer; transition: all 0.2s; background: var(--surface); }
.wtab.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); font-weight: 700; }
.wtab .wdone { font-size: 11px; display: block; margin-top: 2px; opacity: 0.7; }

/* DAY ROW */
.day-row { display: flex; gap: 8px; padding: 16px 20px 0; overflow-x: auto; scrollbar-width: none; }
.day-row::-webkit-scrollbar { display: none; }
.day-pill { min-width: 44px; height: 60px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
.day-pill .dp-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; line-height: 1; }
.day-pill .dp-check { font-size: 10px; color: var(--text3); }
.day-pill.done { border-color: var(--accent); background: var(--accent-dim); }
.day-pill.done .dp-num { color: var(--accent); }
.day-pill.done .dp-check { color: var(--accent); }
.day-pill.active { border-color: var(--accent); border-width: 2px; background: var(--surface2); }
.day-pill.active .dp-num { color: var(--accent); }

/* SECTIONS */
.section { padding: 20px 20px 0; }
.section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.section-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.section-icon.sun { background: rgba(255,200,50,0.15); }
.section-icon.walk { background: rgba(100,200,100,0.15); }
.section-icon.moon { background: rgba(150,100,255,0.15); }
.section-name { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--text2); }
.section-count { margin-left: auto; font-size: 12px; color: var(--text3); }

/* TASK ITEMS */
.task-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; cursor: pointer; transition: all 0.2s; active-scale: 0.98; }
.task-item:active { transform: scale(0.98); }
.task-item.checked { background: var(--accent-dim); border-color: rgba(200,241,53,0.25); }
.task-cb { width: 22px; height: 22px; min-width: 22px; border-radius: 6px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 1px; }
.task-cb.checked { background: var(--accent); border-color: var(--accent); }
.task-cb .ck { color: #0a0a0a; font-size: 13px; font-weight: 700; }
.task-label { font-size: 14px; line-height: 1.5; color: var(--text); transition: color 0.2s; }
.task-item.checked .task-label { color: var(--text3); text-decoration: line-through; }

/* DIARY */
.diary { margin: 20px 20px 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.diary-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.diary-header-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--text2); }
.diary-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.diary-field label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 8px; }
.star-row { display: flex; gap: 6px; }
.star { font-size: 28px; cursor: pointer; color: var(--surface2); transition: all 0.15s; filter: grayscale(1); }
.star.on { color: #f5c542; filter: none; }
.diary-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; resize: none; outline: none; transition: border-color 0.2s; }
.diary-input:focus { border-color: rgba(200,241,53,0.4); }
.diary-input::placeholder { color: var(--text3); }

/* SAVE BTN */
.save-wrap { padding: 16px 20px 0; }
.save-btn { width: 100%; padding: 16px; background: var(--accent); color: #0a0a0a; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity 0.2s; }
.save-btn:active { opacity: 0.8; transform: scale(0.99); }
.save-toast { text-align: center; font-size: 13px; color: var(--accent); padding: 10px; display: none; }

/* BOTTOM NAV */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--border); display: flex; padding: 8px 0 16px; z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px; cursor: pointer; color: var(--text3); font-size: 11px; transition: color 0.2s; }
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 22px; }

/* HISTORY VIEW */
.history-view { display: none; padding: 20px; }
.history-view.visible { display: block; }
.hist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.hist-day { font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--accent); letter-spacing: 1px; }
.hist-meta { font-size: 12px; color: var(--text2); margin: 4px 0; }
.hist-notes { font-size: 13px; color: var(--text); margin-top: 8px; line-height: 1.5; }
.hist-stars { color: #f5c542; font-size: 14px; }

/* MAIN VIEW */
.main-view { display: block; }
.main-view.hidden { display: none; }

/* LOADING */
.loading { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo">K9 TACTICO</div>
  <div class="sync-indicator">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">sincronizado</span>
  </div>
</div>

<div class="main-view" id="main-view">
  <div class="hero">
    <div class="hero-top">
      <div class="hero-title">MES<br/><span>1</span></div>
      <div class="hero-pct" id="hero-pct">0%</div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="hero-meta">
      <div class="meta-item">
        <span class="meta-label">Dias completados</span>
        <span class="meta-value accent" id="meta-done">0</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Racha actual</span>
        <span class="meta-value" id="meta-streak">0 dias</span>
      </div>
      <div class="meta-item">
        <span class="meta-label">Semana actual</span>
        <span class="meta-value" id="meta-week">1</span>
      </div>
    </div>
  </div>

  <div class="week-tabs" id="week-tabs">
    <div class="wtab active" onclick="setWeek(1)">SEM 1<span class="wdone" id="wd1">0/7</span></div>
    <div class="wtab" onclick="setWeek(2)">SEM 2<span class="wdone" id="wd2">0/7</span></div>
    <div class="wtab" onclick="setWeek(3)">SEM 3<span class="wdone" id="wd3">0/7</span></div>
    <div class="wtab" onclick="setWeek(4)">SEM 4<span class="wdone" id="wd4">0/7</span></div>
  </div>

  <div class="day-row" id="day-row"></div>

  <div id="tasks-container"></div>

  <div class="diary" style="margin-top:20px;">
    <div class="diary-header"><span style="font-size:18px;">📓</span><span class="diary-header-title">Diario del dia</span></div>
    <div class="diary-body">
      <div class="diary-field">
        <label>Nivel de reactividad (1 calmado — 5 muy reactivo)</label>
        <div class="star-row" id="stars">
          <span class="star" onclick="setStar(1)">★</span>
          <span class="star" onclick="setStar(2)">★</span>
          <span class="star" onclick="setStar(3)">★</span>
          <span class="star" onclick="setStar(4)">★</span>
          <span class="star" onclick="setStar(5)">★</span>
        </div>
      </div>
      <div class="diary-field">
        <label>Distancia de reaccion</label>
        <input class="diary-input" id="dist-input" placeholder="ej: 10 metros" style="height:42px;"/>
      </div>
      <div class="diary-field">
        <label>Notas — que funciono, que no</label>
        <textarea class="diary-input" id="notes-input" rows="3" placeholder="Escribe aqui las observaciones del dia..."></textarea>
      </div>
    </div>
  </div>

  <div class="save-wrap">
    <button class="save-btn" onclick="saveDay()">GUARDAR DIA</button>
    <div class="save-toast" id="save-toast">✓ Guardado y sincronizado</div>
  </div>
</div>

<div class="history-view" id="history-view">
  <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:16px;color:var(--text2);">HISTORIAL</div>
  <div id="history-content"><div class="loading">Cargando historial...</div></div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" id="nav-home" onclick="showView('home')">
    <span class="nav-icon">🏠</span>
    <span>Inicio</span>
  </div>
  <div class="nav-item" id="nav-hist" onclick="showView('history')">
    <span class="nav-icon">📋</span>
    <span>Historial</span>
  </div>
</div>

<script>
const TASKS = {
  1:{
    manana:["Ignorar al perro 2 min hasta que este calmado, luego premiar","Sit x10 solo con senal de mano","Mirame: premio al ojo, esperar contacto visual x10","Sentarte en el suelo 3 min — premiar si se acuesta cerca"],
    paseo:["Esperar que se siente antes de abrir la puerta","Tu primero al salir","Caminar con perro a tu lado izquierdo","Parar completamente si jala — sin hablar","Cambiar direccion si ve otro perro y se tensa"],
    noche:["Sit x5","Echate x5","Quedate — empezar con 3 segundos","Cepillado suave o masaje 2 min"]
  },
  2:{
    manana:["Ejercicio de la puerta: comida en suelo, cubrir con pie si avanza","Nombre + mirame: decir nombre UNA sola vez, esperar","Sit-Stay progresivo: agregar un paso mas cada dia"],
    paseo:["Cambios de direccion cada 2-3 minutos","Parada tactica cada 5 min: sit, premio, continuar","Si otro perro a 20+ metros sin reaccion: premio inmediato"],
    noche:["Down-Stay: alejarse 2-3 pasos, regresar antes de que se levante","Lugar: senal al tapete, premiar cuando vaya x8","Apagar luces, musica suave 5 min"]
  },
  3:{
    manana:["Repaso rapido de comandos 5 min","Juego de nombres: mostrar juguete, decir nombre, premiar al tocarlo","Sit-Stay con distraccion: tirar premio lejos sin moverse"],
    paseo:["Identificar distancia minima sin reaccion (zona segura)","Trabajar siempre dentro de la zona segura","Tecnica Mira Eso: senal al perro lejano, esperar que te mire, premio"],
    noche:["Repaso de comandos: sit, down, stay, lugar, mirame","Relajacion: mano en costado, respirar profundo","Anotar en diario: distancia de reaccion del dia"]
  },
  4:{
    manana:["Calentamiento rapido 3 min","Circuito: Sit → Down → Sit → Mirame → Stay → Lugar sin pausa","Premio en mano cerrada: esperar que se rinda y se aleje para abrir"],
    paseo:["Reducir distancia de seguridad gradualmente","Paseo paralelo con amigo y perro tranquilo a 5-6 metros","Premio constante por ignorar al otro perro","Si logran 3 min paralelos sin reaccion: terminar con premio grande"],
    noche:["Sesion libre: dejar que elija el juego","Comparar diario semana 1 vs semana 4","Planificar objetivos del mes 2"]
  }
};

const SECTION_META = {
  manana:{ icon:'☀️', cls:'sun', label:'Sesion manana · 15 min' },
  paseo:{ icon:'🐕', cls:'walk', label:'Paseo tactico · 20-30 min' },
  noche:{ icon:'🌙', cls:'moon', label:'Sesion noche · 10 min' }
};

const STORAGE_KEY = 'k9_shared_v1';
let state = {};
let currentWeek = 1;
let currentDay = 1;
let currentStar = 0;

function dk(w,d){ return `w${w}d${d}`; }
function tk(w,d,sec,i){ return `${dk(w,d)}_${sec}_${i}`; }

function loadState(){
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e){ state={}; }
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function ensureDay(w,d){
  const k=dk(w,d);
  if(!state[k]) state[k]={checks:{},star:0,dist:'',notes:'',allDone:false};
}

function setWeek(w){
  currentWeek=w;
  currentDay=(w-1)*7+1;
  document.querySelectorAll('.wtab').forEach((t,i)=>t.classList.toggle('active',i===w-1));
  document.getElementById('meta-week').textContent=w;
  renderDays();
  renderTasks();
  renderDiary();
}

function renderDays(){
  const el=document.getElementById('day-row');
  el.innerHTML='';
  const start=(currentWeek-1)*7+1;
  for(let d=start;d<start+7&&d<=30;d++){
    const k=dk(currentWeek,d);
    const done=state[k]&&state[k].allDone;
    const active=d===currentDay;
    const div=document.createElement('div');
    div.className='day-pill'+(done?' done':'')+(active?' active':'');
    div.innerHTML=`<span class="dp-num">${d}</span><span class="dp-check">${done?'✓':'·'}</span>`;
    div.onclick=()=>{currentDay=d;renderDays();renderTasks();renderDiary();};
    el.appendChild(div);
  }
}

function renderTasks(){
  const tasks=TASKS[currentWeek];
  const k=dk(currentWeek,currentDay);
  ensureDay(currentWeek,currentDay);
  let html='';
  ['manana','paseo','noche'].forEach(sec=>{
    const meta=SECTION_META[sec];
    const total=tasks[sec].length;
    const done=tasks[sec].filter((_,i)=>!!state[k].checks[tk(currentWeek,currentDay,sec,i)]).length;
    html+=`<div class="section">
      <div class="section-header">
        <div class="section-icon ${meta.cls}">${meta.icon}</div>
        <span class="section-name">${meta.label}</span>
        <span class="section-count">${done}/${total}</span>
      </div>`;
    tasks[sec].forEach((t,i)=>{
      const tkey=tk(currentWeek,currentDay,sec,i);
      const checked=!!state[k].checks[tkey];
      html+=`<div class="task-item${checked?' checked':''}" onclick="toggleTask('${sec}',${i})">
        <div class="task-cb${checked?' checked':''}">${checked?'<span class="ck">✓</span>':''}</div>
        <span class="task-label">${t}</span>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('tasks-container').innerHTML=html;
  updateWeekDots();
  updateProgress();
}

function toggleTask(sec,idx){
  const k=dk(currentWeek,currentDay);
  ensureDay(currentWeek,currentDay);
  const tkey=tk(currentWeek,currentDay,sec,idx);
  state[k].checks[tkey]=!state[k].checks[tkey];
  const total=Object.values(TASKS[currentWeek]).flat().length;
  const done=Object.values(state[k].checks).filter(Boolean).length;
  state[k].allDone=done>=total;
  saveState();
  renderTasks();
  renderDays();
}

function renderDiary(){
  const k=dk(currentWeek,currentDay);
  ensureDay(currentWeek,currentDay);
  const d=state[k];
  currentStar=d.star||0;
  document.getElementById('dist-input').value=d.dist||'';
  document.getElementById('notes-input').value=d.notes||'';
  renderStars();
}

function setStar(n){ currentStar=n; renderStars(); }
function renderStars(){
  document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('on',i<currentStar));
}

function saveDay(){
  const k=dk(currentWeek,currentDay);
  ensureDay(currentWeek,currentDay);
  state[k].star=currentStar;
  state[k].dist=document.getElementById('dist-input').value;
  state[k].notes=document.getElementById('notes-input').value;
  saveState();
  const t=document.getElementById('save-toast');
  t.style.display='block';
  setSyncStatus('guardado');
  setTimeout(()=>{t.style.display='none';setSyncStatus('sincronizado');},2000);
}

function setSyncStatus(s){
  document.getElementById('sync-label').textContent=s;
}

function updateWeekDots(){
  for(let w=1;w<=4;w++){
    const start=(w-1)*7+1;
    let done=0, total=0;
    for(let d=start;d<start+7&&d<=30;d++){
      total++;
      const k=dk(w,d);
      if(state[k]&&state[k].allDone) done++;
    }
    const el=document.getElementById('wd'+w);
    if(el) el.textContent=done+'/'+total;
  }
}

function updateProgress(){
  let total=0,done=0,streak=0,maxStreak=0;
  for(let d=1;d<=30;d++){
    const w=Math.ceil(d/7);
    const k=dk(w,d);
    total++;
    if(state[k]&&state[k].allDone){done++;streak++;maxStreak=Math.max(maxStreak,streak);}
    else streak=0;
  }
  const pct=Math.round((done/total)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('hero-pct').textContent=pct+'%';
  document.getElementById('meta-done').textContent=done;
  document.getElementById('meta-streak').textContent=maxStreak+' dias';
}

function showView(v){
  document.getElementById('nav-home').classList.toggle('active',v==='home');
  document.getElementById('nav-hist').classList.toggle('active',v==='history');
  document.getElementById('main-view').classList.toggle('hidden',v!=='home');
  document.getElementById('history-view').classList.toggle('visible',v==='history');
  if(v==='history') renderHistory();
}

function renderHistory(){
  const entries=[];
  for(let w=1;w<=4;w++){
    for(let d=(w-1)*7+1;d<=(w-1)*7+7&&d<=30;d++){
      const k=dk(w,d);
      const s=state[k];
      if(s&&(s.notes||s.star||s.dist)){
        entries.push({w,d,s});
      }
    }
  }
  if(!entries.length){
    document.getElementById('history-content').innerHTML='<div class="loading">Aun no hay entradas en el diario.<br/>Completa algunos dias y aparecen aqui.</div>';
    return;
  }
  entries.reverse();
  let html='';
  entries.forEach(({w,d,s})=>{
    const stars='★'.repeat(s.star||0)+'☆'.repeat(5-(s.star||0));
    html+=`<div class="hist-card">
      <div class="hist-day">DIA ${d} · SEMANA ${w}</div>
      <div class="hist-meta"><span class="hist-stars">${stars}</span>${s.dist?` · ${s.dist}`:''}</div>
      ${s.notes?`<div class="hist-notes">${s.notes}</div>`:''}
    </div>`;
  });
  document.getElementById('history-content').innerHTML=html;
}

// Init
loadState();
setWeek(1);
updateProgress();
</script>
</body>
</html>
